# This config was generated for version %VERSION%
# Find the latest config at https://github.com/SilverstoneMC/ExpensiveDeaths/blob/main/src/main/resources/config.yml


###############################################
#                MAIN SETTINGS                #
###############################################

# Set a message to "" to disable it
# {MONEY} - how much money the player lost
# {BALANCE} - the player's remaining balance
death-message: "&cYou lost ${MONEY} because you died!"
bypass-message: "&aYou didn't lose any money because you have the expensivedeaths.bypass permission!"

# How much money should we take from players when they die?
#
# Valid examples:
#  15% - takes 15% of their current balance
#  0-15% - takes a random amount between 0-15% of their current balance
#  ALL - resets their balance to $0
#  100.00 - takes $100.00 from their balance
#
# Different values can be specified for the groups in your permissions plugin
# The default value will be used if a player is not in any of the defined groups
# Group names must be lowercase
amount-to-take:
  default: 0.00
  #millionaire: 30%

# The format to use for currency symbols
# For 1,234.50 use US
# For 1.234,50 use DE
# For 1'234,50 use CH
# See https://www.iban.com/country-codes for all Alpha-2 country codes
currency-country: US

# The format to use for displaying currencies
# The current format is used by most countries and likely doesn't need to be touched
currency-format: "#,##0.00"



###############################################
#                BONUS SETTINGS               #
###############################################

# Additional features not related to economy
bonus:

  # Parse PlaceholderAPI placeholders inside commands
  parse-placeholders: false

  # Global placeholders (can be used anywhere below):
  #  {PLAYER} - the player's username
  #  {DISPLAYNAME} - the player's display name


  # --- Death --- #

  # Additional placeholders:
  #  {MONEY} - how much money the player lost
  #  {BALANCE} - the player's remaining balance

  # Commands run by console when a player dies
  console-commands-on-death:
  #- "command 1"
  #- "command 2"

  # Commands run by the player when they die
  player-commands-on-death:
  #- "command 1"
  #- "command 2"


  # --- Killed --- #

  # Additional placeholders:
  #  {MONEY} - how much money the killed player lost
  #  {BALANCE} - the killed player's remaining balance
  #  {KILLER} - the killer's username
  #  {KILLER_DISPLAYNAME} - the killer's display name

  # Commands run by console when a player was killed by another player
  console-commands-on-killed:
  #- "command 1"
  #- "command 2"

  # Commands run by the player when they die from another player
  player-commands-on-killed:
  #- "command 1"
  #- "command 2"


  # --- Respawn --- #

  # Commands run by console when the player respawns
  console-commands-on-respawn:
  #- "command 1"
  #- "command 2"

  # Commands run by the player when they respawn
  player-commands-on-respawn:
  #- "command 1"
  #- "command 2"


  ###############################################
  #          ADVANCED COMMAND EXECUTION         #
  ###############################################

  # Advanced Command Execution can be used in any of the command sections above

  # In addition to executing regular commands, you can also
  # require permissions and set chances for commands to run

  # Permission: The permission(s) to check when executing the command
  #  Use a ; to require multiple permissions (AND statement)
  #  Don't include this section if you don't want to perform any permission checks
  #
  # Chance: The percent chance that the command will run, in the form of a decimal (0.01 - 1.0)
  #
  # Break: If set to true, the command will break out of the list and stop executing remaining commands under the "run" key
  #  This can be useful if you want only one command to run out of a list of commands with different chances, but you still want to check permissions for all of them
  #
  # Run: the commands to run


  example: # <- This would normally be the name of the section you're putting these commands in, such as "console-commands-on-death"

    # A regular command with no advanced features as shown above
    - "command 1"

    # Only one command under the permissions "perm.1;perm.2" will be executed
    - permission: 'expensivedeaths.perm.1;expensivedeaths.perm.2'
      run:
        - chance: 0.10
          break: true
          run: "command with 10%"
        - chance: 0.30
          break: true
          run: "command with 30%"
        - chance: 0.40
          break: true
          run: "command with 40%"
        - "command with remaining 20%"

    # Each command has a 50% chance of running, with no permission required
    - run:
      - chance: 0.50
        break: false
        run: "command 1 with 50%"
      - chance: 0.50
        break: false
        run: "command 2 with 50%"

    # "command 1" will always run given the permission "expensivedeaths.perm.1",
    # but "command 2" only has a 40% chance of running given the same permission
    - permission: 'expensivedeaths.perm.1'
      run:
        - "command 1"
        - chance: 0.40
          run: "command 2"



